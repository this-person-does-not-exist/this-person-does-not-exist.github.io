<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>This Person Does Not Exist Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
          },
        },
      };

      document.addEventListener("alpine:init", () => {
        Alpine.data("gallery", () => ({
          imageUrl: "https://thispersondoesnotexist.com",
          page: 1,
          perPage: 20,
          batchId: Date.now(),
          visibleImages: [],
          sourceQueue: [],
          sourceActive: false,
          scrollHandler: null,
          nearBottom: false,
          pendingNextBatch: false,
          loading: {},
          loaded: {},
          failed: {},

          init() {
            const params = new URLSearchParams(window.location.search);
            const requestedPage = Number(params.get("page"));
            this.page = Number.isInteger(requestedPage) && requestedPage > 0 ? requestedPage : 1;
            this.addBatch(this.page);
            this.scrollHandler = () => this.handleScroll();
            window.addEventListener("scroll", this.scrollHandler, { passive: true });
            this.$nextTick(() => {
              if (window.lucide) {
                window.lucide.createIcons();
              }
            });
          },

          buildImages(page) {
            return Array.from({ length: this.perPage }, (_, index) => ({
              id: `${page}-${index + 1}`,
              number: (page - 1) * this.perPage + index + 1,
              page,
              slot: index + 1,
              src: "",
              placeholder: this.placeholder(page, index + 1),
            }));
          },

          placeholder(page, slot) {
            const palettes = [
              { skin: "#d9a178", light: "#f1c8a5", mid: "#b97855", hair: "#5d3428" },
              { skin: "#c98f68", light: "#e8b894", mid: "#9f6347", hair: "#3f2a23" },
              { skin: "#e5b98f", light: "#f5d4b2", mid: "#bf7f58", hair: "#6a4636" },
              { skin: "#b97958", light: "#dca27c", mid: "#86513f", hair: "#2f211c" },
              { skin: "#f0c9a2", light: "#f8dfc2", mid: "#ca8b62", hair: "#71513f" },
              { skin: "#a7674d", light: "#c98b68", mid: "#744333", hair: "#241a17" },
            ];
            const palette = palettes[(slot + page) % palettes.length];
            const svg = `
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
                <defs>
                  <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
                    <stop offset="0%" stop-color="${palette.light}"/>
                    <stop offset="100%" stop-color="${palette.skin}"/>
                  </linearGradient>
                  <filter id="b">
                    <feGaussianBlur stdDeviation="18"/>
                  </filter>
                </defs>
                <rect width="320" height="320" fill="url(#g)"/>
                <ellipse cx="${154 + (slot * 7) % 28}" cy="${140 + (slot * 11) % 30}" rx="${72 + (slot * 3) % 18}" ry="${94 + (slot * 5) % 22}" fill="${palette.light}" opacity=".68" filter="url(#b)"/>
                <circle cx="${122 + (slot * 13) % 56}" cy="${82 + (slot * 17) % 42}" r="${62 + (slot * 5) % 20}" fill="${palette.hair}" opacity=".58" filter="url(#b)"/>
                <ellipse cx="${170 + (slot * 19) % 34}" cy="${198 + (slot * 11) % 34}" rx="${84 + (slot * 7) % 20}" ry="${72 + (slot * 3) % 18}" fill="${palette.mid}" opacity=".46" filter="url(#b)"/>
                <path d="M42 286 C94 218 132 222 166 258 C204 298 254 266 300 212 L300 320 L42 320 Z" fill="${palette.hair}" opacity=".34" filter="url(#b)"/>
              </svg>
            `.replace(/\s+/g, " ").trim();
            return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
          },

          addBatch(page) {
            const images = this.buildImages(page);
            this.visibleImages.push(...images);
            this.sourceQueue.push(...images);
            this.startSourceQueue();
          },

          startSourceQueue() {
            if (this.sourceActive) {
              return;
            }
            this.assignNextSource();
          },

          assignNextSource() {
            const image = this.sourceQueue.shift();
            if (!image) {
              this.sourceActive = false;
              return false;
            }
            this.sourceActive = true;
            image.src = `${this.imageUrl}?page=${image.page}&slot=${image.slot}&batch=${this.batchId}`;
            this.markLoading(image.id);
            return true;
          },

          continueSourceQueue() {
            this.sourceActive = false;
            setTimeout(() => this.startSourceQueue(), 1000);
          },

          handleScroll() {
            const scrollBottom = window.innerHeight + window.scrollY;
            const triggerPoint = document.documentElement.scrollHeight - 500;
            if (scrollBottom < triggerPoint) {
              this.nearBottom = false;
              return;
            }
            if (this.nearBottom) {
              return;
            }
            this.nearBottom = true;
            this.requestNextBatch();
          },

          requestNextBatch() {
            if (!this.isBatchLoaded(this.page)) {
              this.pendingNextBatch = true;
              return;
            }
            this.pendingNextBatch = false;
            this.page += 1;
            this.addBatch(this.page);
          },

          isBatchLoaded(page) {
            const images = this.visibleImages.filter((image) => image.page === page);
            return images.length === this.perPage && images.every((image) => this.loaded[image.id]);
          },

          checkPendingBatch() {
            if (!this.pendingNextBatch || !this.nearBottom || !this.isBatchLoaded(this.page)) {
              return;
            }
            this.requestNextBatch();
          },

          remainingInBatch(page) {
            const images = this.visibleImages.filter((image) => image.page === page);
            return images.filter((image) => !this.loaded[image.id] && !this.failed[image.id]).length;
          },

          batchStatus() {
            const remaining = this.remainingInBatch(this.page);
            if (this.pendingNextBatch) {
              return `Next batch is waiting — ${remaining} ${remaining === 1 ? "portrait" : "portraits"} left in this one.`;
            }
            if (!this.isBatchLoaded(this.page)) {
              return `Loading this batch one image at a time — ${remaining} of ${this.perPage} left.`;
            }
            return "Scroll down to load the next batch.";
          },

          markLoading(id) {
            this.loading[id] = true;
            this.loaded[id] = false;
            this.failed[id] = false;
          },

          markLoaded(id) {
            this.loading[id] = false;
            this.loaded[id] = true;
            this.checkPendingBatch();
            this.continueSourceQueue();
          },

          markFailed(id) {
            this.loading[id] = false;
            this.loaded[id] = false;
            this.failed[id] = true;
            this.continueSourceQueue();
          },

          navigate(page) {
            const nextPage = Math.max(1, page);
            window.location.href = `${window.location.pathname}?page=${nextPage}`;
          },

          reload() {
            window.location.reload();
          },
        }));
      });
    </script>
  </head>
  <body x-data="gallery" class="flex min-h-screen flex-col bg-zinc-50 text-zinc-950">
    <div class="mx-auto w-full max-w-7xl px-4 py-5 sm:px-6 lg:px-8">
      <header class="flex flex-col gap-4 border-b border-zinc-200 pb-4 sm:flex-row sm:items-center sm:justify-between">
        <h1 class="text-xl font-semibold tracking-normal text-zinc-950 sm:text-2xl">
          This Person Does Not Exist
        </h1>

        <nav class="flex w-full overflow-hidden rounded-md border border-zinc-300 bg-white shadow-sm sm:w-fit" aria-label="Gallery navigation">
          <button
            type="button"
            class="inline-flex h-9 w-12 flex-shrink-0 items-center justify-center border-r border-zinc-300 text-zinc-800 transition hover:bg-zinc-100 disabled:cursor-not-allowed disabled:opacity-45"
            :disabled="page === 1"
            @click="navigate(page - 1)"
            title="Previous page"
            aria-label="Previous page"
          >
            <i data-lucide="chevron-left" class="h-4 w-4" aria-hidden="true"></i>
          </button>
          <div class="flex h-9 min-w-20 flex-1 items-center justify-center border-r border-zinc-300 px-3 text-xs font-medium text-zinc-700 sm:flex-none">
            Page <span class="ml-1 tabular-nums" x-text="page"></span>
          </div>
          <button
            type="button"
            class="inline-flex h-9 w-12 flex-shrink-0 items-center justify-center border-r border-zinc-300 text-zinc-800 transition hover:bg-zinc-100"
            @click="navigate(page + 1)"
            title="Next page"
            aria-label="Next page"
          >
            <i data-lucide="chevron-right" class="h-4 w-4" aria-hidden="true"></i>
          </button>
          <button
            type="button"
            class="inline-flex h-9 w-12 flex-shrink-0 items-center justify-center bg-zinc-950 text-white transition hover:bg-zinc-800"
            @click="reload()"
            title="Reload"
            aria-label="Reload"
          >
            <i data-lucide="refresh-cw" class="h-4 w-4" aria-hidden="true"></i>
          </button>
        </nav>
      </header>

      <section class="grid grid-cols-2 gap-3 py-5 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5" aria-label="Generated portraits">
        <template x-for="image in visibleImages" :key="image.id">
          <article class="overflow-hidden rounded-lg border border-zinc-200 bg-white shadow-sm">
            <div class="relative aspect-square overflow-hidden bg-zinc-100">
              <div
                class="absolute inset-0 scale-105 bg-cover bg-center blur-xl transition-opacity duration-1000"
                :class="loaded[image.id] ? 'opacity-0' : 'opacity-100'"
                :style="{ backgroundImage: image.placeholder }"
                aria-hidden="true"
              ></div>
              <div
                x-show="loading[image.id]"
                x-transition:leave="transition-opacity duration-1000 ease-out"
                x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0"
                class="absolute inset-0 grid place-items-center"
              >
                <div class="h-8 w-8 animate-spin rounded-full border-2 border-white/60 border-t-zinc-950 shadow-sm" aria-label="Loading"></div>
              </div>
              <template x-if="image.src">
                <img
                  class="relative h-full w-full object-cover transition-all duration-1000 ease-out"
                  :class="loaded[image.id] ? 'opacity-100 blur-0 scale-100' : 'opacity-0 blur-md scale-105'"
                  :src="image.src"
                  :alt="`Generated portrait ${image.number}`"
                  @load="markLoaded(image.id)"
                  @error="markFailed(image.id)"
                  referrerpolicy="no-referrer"
                />
              </template>
              <div
                x-show="image.src && failed[image.id]"
                class="absolute inset-0 grid place-items-center bg-zinc-100 px-3 text-center text-xs font-medium text-red-700"
              >
                Image failed to load
              </div>
            </div>
            <div class="flex h-10 items-center border-t border-zinc-200 px-3 text-xs text-zinc-600">
              <span>#<span x-text="image.number"></span></span>
            </div>
          </article>
        </template>
      </section>

      <div class="flex items-center justify-center gap-3 py-8 text-center text-xs font-medium text-zinc-600" aria-live="polite">
        <span
          x-show="!isBatchLoaded(page) || pendingNextBatch"
          class="h-4 w-4 animate-spin rounded-full border-2 border-zinc-300 border-t-zinc-950"
          aria-label="Loading"
        ></span>
        <span x-text="batchStatus()"></span>
      </div>
    </div>

    <footer class="mt-auto border-t border-zinc-200 bg-white">
      <div class="mx-auto max-w-7xl px-6 py-12 md:flex md:items-center md:justify-between lg:px-8">
        <div class="flex justify-center gap-x-6 md:order-2">
          <a href="https://github.com/this-person-does-not-exist/this-person-does-not-exist.github.io" class="text-zinc-600 hover:text-zinc-900 transition-colors" target="_blank" rel="noopener noreferrer">
            <span class="sr-only">GitHub</span>
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" class="h-6 w-6">
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" fill-rule="evenodd" />
            </svg>
          </a>
        </div>
        <div class="mt-8 md:order-1 md:mt-0">
          <p class="text-xs leading-5 text-zinc-600 sm:text-sm">
            Twenty generated portraits per page. Every tile uses the same image source:
            <span class="font-mono text-xs text-zinc-800">https://thispersondoesnotexist.com</span>
          </p>
          <p class="mt-4 text-xs text-zinc-400">
            &copy; 2024 This Person Does Not Exist Browser. All rights reserved.
          </p>
        </div>
      </div>
    </footer>
  </body>
</html>
